name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Verify build output
        run: |
          echo "✅ Build verification:"
          test -d dist || (echo "❌ dist folder not found" && exit 1)
          FILE_COUNT=$(find dist -type f | wc -l)
          echo "✅ Generated $FILE_COUNT files"
          echo "✅ Sample files:"
          find dist -type f -name "*.html" | head -5
          echo "✅ dist folder size:"
          du -sh dist/

      - name: Install Wrangler
        run: npm install -g wrangler

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo "Deploying to Cloudflare Pages..."
          wrangler pages deploy dist \
            --project-name shogi-study \
            --branch main
        continue-on-error: true

      - name: Show deployment status
        if: failure()
        run: |
          echo "⚠️ Deployment completed with status code: $?"
          echo ""
          echo "Verify the following:"
          echo "1. CLOUDFLARE_API_TOKEN is set in GitHub Secrets"
          echo "2. CLOUDFLARE_ACCOUNT_ID is set in GitHub Secrets"
          echo "3. Project name 'shogi-study' exists in Cloudflare Pages"
